env_settings:
  timeout_wait: 300
  seed: 42
  num_envs: 6
  max_lifetime_restarts: 6
  restarts_rate_limit_n: 1
  restarts_rate_limit_period_s: 60

engine_settings:
  time_scale: 20 #20
  no_graphics: true

behaviors:
  DroneAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960        # aumentato: più esperienza per episodi lunghi con ostacoli 
      learning_rate: 3.0e-4 
      beta: 1.5e-2 # più entropia: esplora più traiettorie per aggirare ostacoli
      beta_schedule: linear
      epsilon: 0.2 
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      shared_critic: false
    network_settings:
      normalize: true
      hidden_units: 512 # aumentato: più capacità per integrare ray + vector obs
      num_layers: 3 # aumentato: task più complesso
    reward_signals:
      extrinsic:
        gamma: 0.995 # più alto: considera reward futuri più lontani (traiettorie lunghe)
        strength: 1.0
    max_steps: 4500000 # aggiunti 1.5M in più #2500000 #5000000
    
    time_horizon: 512 # aumentato: episodi più lunghi con ostacoli
    summary_freq: 100000  # 5000 occupa troppo spazio
    checkpoint_interval: 500000
    keep_checkpoints: 3 # 5