env_settings:
  timeout_wait: 300
  seed: 42
  num_envs: 6
  max_lifetime_restarts: 5
  restarts_rate_limit_n: 1
  restarts_rate_limit_period_s: 60

engine_settings:
  time_scale: 20 #20
  no_graphics: true

behaviors:
  DroneAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 24576 
      learning_rate: 1.0e-4 
      beta: 5.0e-3
      beta_schedule: linear
      epsilon: 0.2 
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      shared_critic: false
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99 
        strength: 1.0
    max_steps: 5000000 #5000000
    
    time_horizon: 512
    summary_freq: 100000  # 5000 occupa troppo spazio
    checkpoint_interval: 500000  
    keep_checkpoints: 3 # 5